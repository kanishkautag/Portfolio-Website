    <script>
    (function () {
      var k = "portfolio-theme";
      var r = document.documentElement;
      try {
        var s = localStorage.getItem(k);
        if (s === "light" || s === "dark") r.dataset.theme = s;
        else if (window.matchMedia("(prefers-color-scheme: light)").matches) r.dataset.theme = "light";
        else r.dataset.theme = "dark";
      } catch (e) {
        r.dataset.theme = "dark";
      }
      var m = document.querySelector('meta[name="theme-color"]');
      if (m && r.dataset.theme) {
        m.setAttribute("content", r.dataset.theme === "light" ? "#f1f5f9" : "#0f0f14");
      }
    })();
    </script>
