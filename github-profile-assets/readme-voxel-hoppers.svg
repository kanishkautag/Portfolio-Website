<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 132" width="640" height="132" role="img" aria-label="Voxel-style figures hopping">
  <title>Voxel hop animation</title>
  <rect width="640" height="132" fill="#070707"/>
  <text x="320" y="28" text-anchor="middle" fill="#bdbdbd" font-family="ui-monospace, Consolas, monospace" font-size="12" letter-spacing="0.28em">VOXEL CREW</text>
  <!-- ground -->
  <rect x="48" y="102" width="544" height="2" fill="#2a2a2a"/>
  <!-- figure A -->
  <g transform="translate(120,102)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,-20; 0,0; 0,-20" keyTimes="0;0.5;1" dur="0.85s" repeatCount="indefinite"/>
      <rect x="-10" y="-42" width="20" height="14" fill="#dedede" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-12" y="-28" width="24" height="18" fill="#c8c8c8" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-8" y="-10" width="7" height="10" fill="#a8a8a8" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="1" y="-10" width="7" height="10" fill="#a8a8a8" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-4" y="-36" width="4" height="4" fill="#0a0a0a"/><rect x="2" y="-36" width="4" height="4" fill="#0a0a0a"/>
    </g>
  </g>
  <!-- figure B -->
  <g transform="translate(320,102)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,-20; 0,0; 0,-20" keyTimes="0;0.5;1" dur="0.85s" repeatCount="indefinite" begin="0.28s"/>
      <rect x="-10" y="-44" width="20" height="16" fill="#ececec" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-12" y="-28" width="24" height="18" fill="#b6b6b6" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-8" y="-10" width="7" height="10" fill="#909090" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="1" y="-10" width="7" height="10" fill="#909090" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-4" y="-38" width="4" height="4" fill="#0a0a0a"/><rect x="2" y="-38" width="4" height="4" fill="#0a0a0a"/>
    </g>
  </g>
  <!-- figure C -->
  <g transform="translate(520,102)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,-20; 0,0; 0,-20" keyTimes="0;0.5;1" dur="0.85s" repeatCount="indefinite" begin="0.56s"/>
      <rect x="-10" y="-40" width="20" height="12" fill="#cfcfcf" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-12" y="-28" width="24" height="18" fill="#d8d8d8" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-8" y="-10" width="7" height="10" fill="#a0a0a0" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="1" y="-10" width="7" height="10" fill="#a0a0a0" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="-4" y="-34" width="4" height="4" fill="#0a0a0a"/><rect x="2" y="-34" width="4" height="4" fill="#0a0a0a"/>
    </g>
  </g>
  <text x="320" y="124" text-anchor="middle" fill="#555555" font-family="ui-monospace, Consolas, monospace" font-size="9" letter-spacing="0.2em">BLOCKY · NOT OFFICIAL MOJANG ART</text>
</svg>
